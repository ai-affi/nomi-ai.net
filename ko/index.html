<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="meta.title"></title>
  <meta name="description" data-i18n-attr="content" data-i18n="meta.description">
  <meta name="keywords" data-i18n-attr="content" data-i18n="meta.keywords">
  <link rel="canonical" href="https://nomi-ai.net/">
  <meta property="og:title" data-i18n-attr="content" data-i18n="meta.title">
  <meta property="og:description" data-i18n-attr="content" data-i18n="meta.description">
  <meta property="og:url" content="https://nomi-ai.net/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://nomi-ai.net/images/og-cover.webp">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" data-i18n-attr="content" data-i18n="meta.title">
  <meta name="twitter:description" data-i18n-attr="content" data-i18n="meta.description">
  <meta name="twitter:image" content="https://nomi-ai.net/images/og-cover.webp">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <style>
    :root {
      --bg: #0f0f1a;
      --card-bg: #1a1a2e;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #8b5cf6;
      --accent: #ec4899;
      --border: #2d2d44;
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 0.2s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      line-height: 1.6;
    }
    img { display: block; max-width: 100%; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { color: var(--accent); }
    h1 { font-size: 3rem; font-weight: 800; line-height: 1.1; }
    h2 { font-size: 2rem; font-weight: 800; line-height: 1.2; }
    h3 { font-size: 1.1rem; font-weight: 700; }
    p { margin-bottom: 1rem; color: var(--text-muted); }
    p:last-child { margin-bottom: 0; }
    section { padding: 4rem 0; border-top: 1px solid rgba(45,45,68,.3); }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }
    .section-header { text-align: center; margin-bottom: 3rem; }
    .section-header h2 { margin-bottom: .75rem; position: relative; display: inline-block; }
    .section-header h2::after {
      content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
      width: 60px; height: 3px; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 3px;
    }
    .section-header p { color: var(--text-muted); font-size: 1.1rem; max-width: 640px; margin: 0 auto; }
    .gradient-text {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .btn {
      display: inline-block; padding: .85rem 2rem; border-radius: 50px; font-weight: 700; font-size: 1rem;
      cursor: pointer; transition: transform var(--transition), box-shadow var(--transition); text-decoration: none; border: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(139,92,246,.35); color: #fff; }
    .btn-secondary { background: transparent; color: var(--text); border: 2px solid var(--border); }
    .btn-secondary:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-2px); }

    /* HERO */
    #hero {
      position: relative; overflow: hidden; padding: 6rem 0 5rem;
      background:
        radial-gradient(ellipse at top right, rgba(139,92,246,.2), transparent 60%),
        radial-gradient(ellipse at bottom left, rgba(236,72,153,.15), transparent 60%);
    }
    .hero-badge {
      display: inline-block; background: rgba(139,92,246,.15); border: 1px solid rgba(139,92,246,.35);
      color: var(--primary); border-radius: 50px; padding: .4rem 1.1rem; font-size: .85rem; font-weight: 600; margin-bottom: 1.5rem;
    }
    .hero-title { margin-bottom: 1.5rem; white-space: pre-line; }
    .hero-subtitle { font-size: 1.15rem; max-width: 600px; margin-bottom: 2rem; }
    .hero-subtitle p { color: var(--text-muted); font-size: 1.15rem; }
    .hero-cta { display: flex; gap: 1rem; flex-wrap: wrap; }

    /* TOC */
    #toc { padding: 2rem 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .toc-inner { display: flex; gap: .5rem 2rem; flex-wrap: wrap; align-items: center; }
    .toc-label { font-weight: 700; font-size: .9rem; color: var(--text); white-space: nowrap; }
    .toc-list { display: flex; flex-wrap: wrap; gap: .4rem .75rem; list-style: none; }
    .toc-list li a {
      font-size: .85rem; color: var(--text-muted); padding: .3rem .6rem; border-radius: var(--radius-sm);
      border: 1px solid var(--border); transition: color var(--transition), border-color var(--transition);
    }
    .toc-list li a:hover { color: var(--primary); border-color: var(--primary); }

    /* SUMMARY */
    #summary { background: #16162c; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }
    .scorecard { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
    .rating-headline { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--text); }
    .score-bar { margin-bottom: 1.25rem; }
    .score-bar-header { display: flex; justify-content: space-between; margin-bottom: .4rem; font-size: .85rem; }
    .score-bar-label { color: var(--text-muted); }
    .score-bar-value { color: var(--primary); font-weight: 700; }
    .bar-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 4px; }
    .scorecard .btn { width: 100%; text-align: center; margin-top: 1.5rem; }

    /* CHARACTERS */
    .characters-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2.5rem; }
    .character-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color var(--transition), transform var(--transition); }
    .character-card:hover { border-color: var(--primary); transform: translateY(-3px); }
    .character-card img { width: 100%; height: auto; aspect-ratio: 3/4; object-fit: cover; }
    .character-card-body { padding: 1.25rem; }
    .character-name { font-weight: 800; font-size: 1.1rem; margin-bottom: .25rem; }
    .character-tagline { font-size: .8rem; font-weight: 600; color: var(--primary); background: rgba(139,92,246,.12); border: 1px solid rgba(139,92,246,.25); border-radius: 50px; padding: .2rem .7rem; display: inline-block; margin-bottom: .75rem; }
    .character-desc { font-size: .9rem; color: var(--text-muted); margin: 0; }
    .characters-cta { text-align: center; }

    /* COMPARISON */
    #comparison { background: #16162c; }
    .comparison-intro { margin-bottom: 2rem; color: var(--text-muted); }
    .comparison-table { width: 100%; border-collapse: collapse; border-radius: var(--radius); overflow: hidden; margin-bottom: 2rem; }
    .comparison-table th { padding: 1rem 1.25rem; text-align: left; font-size: .9rem; font-weight: 700; }
    .comparison-table th:nth-child(1) { background: #1e1e38; color: var(--text-muted); }
    .comparison-table th:nth-child(2) { background: linear-gradient(135deg, rgba(139,92,246,.25), rgba(236,72,153,.15)); color: var(--text); text-align: center; }
    .comparison-table th:nth-child(3) { background: #1e1e38; color: var(--text-muted); text-align: center; }
    .comparison-table td { padding: .9rem 1.25rem; font-size: .9rem; border-top: 1px solid var(--border); }
    .comparison-table tr:nth-child(even) td { background: rgba(255,255,255,.02); }
    .comparison-table td:nth-child(1) { color: var(--text-muted); font-weight: 600; }
    .comparison-table td:nth-child(2) { color: var(--text); text-align: center; }
    .comparison-table td:nth-child(3) { color: var(--text-muted); text-align: center; font-size: .85rem; }
    .nomi-win { color: #4ade80; font-weight: 600; }
    .others-lose { color: #f87171; }
    .comparison-conclusion { margin-bottom: 1.5rem; }
    .comparison-cta { text-align: center; }

    /* PRICING */
    .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; align-items: start; }
    .pricing-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; position: relative; transition: border-color var(--transition), transform var(--transition); }
    .pricing-card:hover { border-color: var(--primary); transform: translateY(-3px); }
    .pricing-card.featured { border-color: var(--primary); background: linear-gradient(180deg, rgba(139,92,246,.08) 0%, var(--card-bg) 100%); }
    .pricing-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; font-size: .75rem; font-weight: 700; padding: .3rem .9rem; border-radius: 50px; white-space: nowrap; }
    .pricing-name { font-weight: 700; font-size: 1rem; color: var(--text-muted); margin-bottom: .5rem; }
    .pricing-price { font-size: 2.5rem; font-weight: 800; margin-bottom: .25rem; }
    .pricing-period { font-size: .85rem; color: var(--text-muted); margin-bottom: 1.5rem; }
    .pricing-features { list-style: none; margin-bottom: 1.5rem; }
    .pricing-features li { padding: .5rem 0; border-bottom: 1px solid var(--border); font-size: .9rem; color: var(--text-muted); display: flex; align-items: center; gap: .5rem; }
    .pricing-features li::before { content: "✓"; color: var(--primary); font-weight: 700; flex-shrink: 0; }
    .pricing-card .btn { width: 100%; text-align: center; }

    /* WHO */
    #who { background: #16162c; }
    .who-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .who-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; transition: border-color var(--transition), transform var(--transition); }
    .who-card:hover { border-color: var(--primary); transform: translateY(-3px); }
    .who-icon { font-size: 2rem; margin-bottom: .75rem; }
    .who-title { font-weight: 700; margin-bottom: .5rem; }
    .who-text { font-size: .9rem; color: var(--text-muted); margin: 0; }

    /* FEATURES */
    .features-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
    .feature-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.75rem; transition: border-color var(--transition), transform var(--transition); }
    .feature-card:hover { border-color: var(--primary); transform: translateY(-3px); }
    .feature-icon { font-size: 1.75rem; margin-bottom: .75rem; }
    .feature-title { margin-bottom: .75rem; }
    .feature-text { font-size: .9rem; color: var(--text-muted); margin: 0; }

    /* REVIEWS */
    #reviews { background: #16162c; }
    .reviews-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
    .review-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.75rem; transition: border-color var(--transition), transform var(--transition); }
    .review-card:hover { border-color: var(--primary); transform: translateY(-3px); }
    .review-card.featured-review { grid-column: span 2; }
    .review-stars { color: var(--accent); font-size: 1rem; margin-bottom: 1rem; }
    .review-quote { font-size: .95rem; color: var(--text); line-height: 1.7; margin-bottom: 1.25rem; font-style: italic; }
    .review-quote::before { content: "\201C"; color: var(--primary); font-size: 1.4rem; line-height: 0; vertical-align: -0.4rem; margin-right: .1rem; }
    .review-author { font-weight: 700; font-size: .9rem; }
    .review-context { font-size: .8rem; color: var(--text-muted); margin: 0; }

    /* HOW */
    #how { background: var(--bg); }
    .steps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; margin-bottom: 3rem; }
    .step-card { text-align: center; padding: 2.5rem 1.5rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition); }
    .step-card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(139,92,246,.15); }
    .step-number { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: .75rem; display: block; }
    .step-title { margin-bottom: .75rem; color: var(--text); }
    .step-text { font-size: .9rem; color: var(--text-muted); margin: 0; }
    .how-cta { text-align: center; margin-top: 2rem; }

    /* FAQ */
    #faq { background: #16162c; }
    .faq-list { max-width: 760px; margin: 0 auto; }
    .faq-item { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; overflow: hidden; background: var(--card-bg); }
    .faq-question { padding: 1.25rem 1.5rem; font-weight: 700; font-size: .95rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; background: var(--card-bg); color: var(--text); }
    .faq-question .faq-icon { color: var(--primary); font-size: 1.25rem; }
    .faq-answer { border-top: 1px solid var(--border); }
    .faq-answer-inner { padding: 1.25rem 1.5rem; font-size: .9rem; color: var(--text-muted); line-height: 1.7; }

    /* VERDICT */
    #verdict {
      background:
        radial-gradient(ellipse at top left, rgba(139,92,246,.12), transparent 55%),
        radial-gradient(ellipse at bottom right, rgba(236,72,153,.1), transparent 55%);
    }
    .verdict-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 3rem; max-width: 820px; margin: 0 auto; text-align: center; position: relative; overflow: hidden; }
    .verdict-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--accent)); }
    .verdict-box h2 { margin-bottom: 2rem; position: relative; z-index: 1; }
    .verdict-box p { max-width: 680px; margin: 0 auto 1.25rem; position: relative; z-index: 1; }
    .verdict-badges { display: flex; flex-wrap: wrap; justify-content: center; gap: .75rem; margin: 2rem 0; position: relative; z-index: 1; }
    .verdict-badge { background: rgba(139,92,246,.12); border: 1px solid rgba(139,92,246,.3); color: var(--primary); border-radius: 50px; padding: .4rem 1rem; font-size: .85rem; font-weight: 700; }
    .verdict-box .btn { font-size: 1.1rem; padding: 1rem 2.5rem; margin: .5rem 0; position: relative; z-index: 1; }
    .affiliate-note { font-size: .8rem; color: var(--text-muted); margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); position: relative; z-index: 1; }

    /* FOOTER */
    footer { background: var(--card-bg); border-top: 1px solid var(--border); padding: 2.5rem 0; text-align: center; }
    .footer-copyright { font-size: .85rem; color: var(--text-muted); margin-bottom: .5rem; }
    .footer-disclaimer { font-size: .8rem; color: var(--border); }
    footer a { font-size: .85rem; }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .characters-grid { grid-template-columns: repeat(2, 1fr); }
      .pricing-grid { grid-template-columns: repeat(2, 1fr); }
      .who-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      h1 { font-size: 2rem; }
      h2 { font-size: 1.6rem; }
      section { padding: 3rem 0; }
      .hero-cta { flex-direction: column; align-items: flex-start; }
      .hero-cta .btn { width: 100%; text-align: center; }
      .summary-grid { grid-template-columns: 1fr; gap: 2rem; }
      .characters-grid { grid-template-columns: 1fr; }
      .comparison-table { font-size: .8rem; }
      .comparison-table th, .comparison-table td { padding: .7rem .75rem; }
      .pricing-grid { grid-template-columns: 1fr; }
      .who-grid { grid-template-columns: 1fr; }
      .features-grid { grid-template-columns: 1fr; }
      .reviews-grid { grid-template-columns: 1fr; }
      .review-card.featured-review { grid-column: span 1; }
      .steps-grid { grid-template-columns: 1fr; }
      .verdict-box { padding: 2rem 1.5rem; }
      .toc-inner { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <section id="hero">
    <div class="container">
      <div class="hero-badge" data-i18n="hero.badge"></div>
      <h1 class="hero-title" data-i18n="hero.title"></h1>
      <div class="hero-subtitle">
        <p data-i18n="hero.paragraph1"></p>
        <p data-i18n="hero.paragraph2"></p>
      </div>
      <div class="hero-cta">
        <a href="/go/nomi" class="btn btn-primary" rel="sponsored noopener" target="_blank" data-i18n="hero.cta_primary"></a>
        <a href="#summary" class="btn btn-secondary" data-i18n="hero.cta_secondary"></a>
      </div>
    </div>
  </section>

  <section id="toc">
    <div class="container">
      <div class="toc-inner">
        <span class="toc-label" data-i18n="toc.title"></span>
        <ul class="toc-list" id="toc-list"></ul>
      </div>
    </div>
  </section>

  <section id="summary">
    <div class="container">
      <div class="section-header">
        <h2 data-i18n="summary.title"></h2>
        <p data-i18n="summary.subtitle"></p>
      </div>
      <div class="summary-grid">
        <div class="summary-text">
          <p data-i18n="summary.paragraph1"></p>
          <p data-i18n="summary.paragraph2"></p>
          <p data-i18n="summary.paragraph3"></p>
        </div>
        <div class="scorecard">
          <div class="rating-headline" data-i18n="summary.rating_label"></div>
          <div id="score-bars"></div>
          <a href="/go/nomi" class="btn btn-primary" rel="sponsored noopener" target="_blank" data-i18n="summary.cta"></a>
        </div>
      </div>
    </div>
  </section>

  <section id="characters">
    <div class="container">
      <div class="section-header">
        <h2 data-i18n="characters.title"></h2>
        <p data-i18n="characters.subtitle"></p>
      </div>
      <div class="characters-grid" id="characters-grid"></div>
      <div class="characters-cta">
        <a href="/go/nomi" class="btn btn-primary" rel="sponsored noopener" target="_blank" data-i18n="characters.cta"></a>
      </div>
    </div>
  </section>

  <section id="comparison">
    <div class="container">
      <div class="section-header">
        <h2 data-i18n="comparison.title"></h2>
        <p data-i18n="comparison.subtitle"></p>
      </div>
      <p class="comparison-intro" data-i18n="comparison.intro"></p>
      <table class="comparison-table">
        <thead>
          <tr>
            <th data-i18n="comparison.table_headers.0"></th>
            <th data-i18n="comparison.table_headers.1"></th>
            <th data-i18n="comparison.table_headers.2"></th>
          </tr>
        </thead>
        <tbody id="comparison-rows"></tbody>
      </table>
      <p class="comparison-conclusion" data-i18n="comparison.conclusion"></p>
      <div class="comparison-cta">
        <a href="/go/nomi" class="btn btn-primary" rel="sponsored noopener" target="_blank" data-i18n="comparison.cta"></a>
      </div>
    </div>
  </section>

  <section id="pricing">
    <div class="container">
      <div class="section-header">
        <h2 data-i18n="pricing.title"></h2>
        <p data-i18n="pricing.subtitle"></p>
      </div>
      <div class="pricing-grid" id="pricing-grid"></div>
    </div>
  </section>

  <section id="who">
    <div class="container">
      <div class="section-header">
        <h2 data-i18n="who.title"></h2>
        <p data-i18n="who.subtitle"></p>
      </div>
      <div class="who-grid" id="who-grid"></div>
    </div>
  </section>

  <section id="features">
    <div class="container">
      <div class="section-header">
        <h2 data-i18n="features.title"></h2>
        <p data-i18n="features.subtitle"></p>
      </div>
      <div class="features-grid" id="features-grid"></div>
    </div>
  </section>

  <section id="reviews">
    <div class="container">
      <div class="section-header">
        <h2 data-i18n="reviews.title"></h2>
        <p data-i18n="reviews.subtitle"></p>
      </div>
      <div class="reviews-grid" id="reviews-grid"></div>
    </div>
  </section>

  <section id="how">
    <div class="container">
      <div class="section-header">
        <h2 data-i18n="how.title"></h2>
        <p data-i18n="how.subtitle"></p>
      </div>
      <div class="steps-grid" id="steps-grid"></div>
      <div class="how-cta">
        <a href="/go/nomi" class="btn btn-primary" rel="sponsored noopener" target="_blank" data-i18n="how.cta"></a>
      </div>
    </div>
  </section>

  <section id="faq">
    <div class="container">
      <div class="section-header">
        <h2 data-i18n="faq.title"></h2>
      </div>
      <div class="faq-list" id="faq-list"></div>
    </div>
  </section>

  <section id="verdict">
    <div class="container">
      <div class="verdict-box">
        <h2 data-i18n="verdict.title"></h2>
        <p data-i18n="verdict.paragraph1"></p>
        <p data-i18n="verdict.paragraph2"></p>
        <p data-i18n="verdict.paragraph3"></p>
        <div class="verdict-badges" id="verdict-badges"></div>
        <a href="/go/nomi" class="btn btn-primary" rel="sponsored noopener" target="_blank" data-i18n="verdict.cta"></a>
        <p class="affiliate-note" data-i18n="verdict.affiliate_note"></p>
      </div>
    </div>

  <footer>
    <div class="container">
      <p class="footer-copyright">
        <span data-i18n="footer.copyright"></span> — <a href="/go/nomi" rel="sponsored noopener" target="_blank" data-i18n="footer.link"></a>
      </p>
      <p class="footer-disclaimer" data-i18n="footer.disclaimer"></p>
    </div>
  </footer>

  <script>
  (async function () {
    let c;
    try {
      const res = await fetch('./content.json');
      if (!res.ok) throw new Error('Failed to load content.json');
      c = await res.json();
    } catch (e) {
      console.error(e);
      return;
    }

    const get = (obj, path) => path.split('.').reduce((o, k) => o && o[k], obj);

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      const val = get(c, key);
      if (val !== undefined) {
        if (el.hasAttribute('data-i18n-attr')) {
          el.setAttribute(el.getAttribute('data-i18n-attr'), val);
        } else {
          el.innerHTML = val;
        }
      }
    });

    const tocList = document.getElementById('toc-list');
    if (tocList && c.toc && c.toc.items) {
      tocList.innerHTML = c.toc.items.map(i => `<li><a href="${i.href}">${i.text}</a></li>`).join('');
    }

    const scoreBars = document.getElementById('score-bars');
    if (scoreBars && c.summary && c.summary.scores) {
      scoreBars.innerHTML = c.summary.scores.map(sc => `
        <div class="score-bar">
          <div class="score-bar-header">
            <span class="score-bar-label">${sc.label}</span>
            <span class="score-bar-value">${sc.value}</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${sc.percent}%"></div></div>
        </div>`).join('');
    }

    const charGrid = document.getElementById('characters-grid');
    if (charGrid && c.characters && c.characters.items) {
      charGrid.innerHTML = c.characters.items.map(ch => `
        <div class="character-card">
          <img src="${ch.image}" alt="${ch.name}" loading="lazy" width="280" height="373">
          <div class="character-card-body">
            <div class="character-name">${ch.name}</div>
            <span class="character-tagline">${ch.tagline}</span>
            <p class="character-desc">${ch.description}</p>
          </div>
        </div>`).join('');
    }

    const compRows = document.getElementById('comparison-rows');
    if (compRows && c.comparison && c.comparison.rows) {
      compRows.innerHTML = c.comparison.rows.map(r => `
        <tr>
          <td>${r.feature}</td>
          <td class="nomi-win">✓ ${r.nomi}</td>
          <td class="others-lose">✗ ${r.others}</td>
        </tr>`).join('');
    }

    const pricingGrid = document.getElementById('pricing-grid');
    if (pricingGrid && c.pricing && c.pricing.plans) {
      pricingGrid.innerHTML = c.pricing.plans.map(plan => {
        const feats = plan.features.map(f => `<li>${f}</li>`).join('');
        const badge = plan.featured ? '<div class="pricing-badge">⭐ MOST POPULAR</div>' : '';
        const cardCls = plan.featured ? ' featured' : '';
        const priceCls = plan.featured ? ' gradient-text' : '';
        const btnCls = plan.featured ? 'btn-primary' : 'btn-secondary';
        return `
          <div class="pricing-card${cardCls}">
            ${badge}
            <div class="pricing-name">${plan.name}</div>
            <div class="pricing-price${priceCls}">${plan.price}</div>
            <div class="pricing-period">${plan.period}</div>
            <ul class="pricing-features">${feats}</ul>
            <a href="/go/nomi" class="btn ${btnCls}" rel="sponsored noopener" target="_blank">${plan.cta}</a>
          </div>`;
      }).join('');
    }

    const whoGrid = document.getElementById('who-grid');
    if (whoGrid && c.who && c.who.profiles) {
      whoGrid.innerHTML = c.who.profiles.map(p => `
        <div class="who-card">
          <div class="who-icon">${p.icon}</div>
          <div class="who-title">${p.title}</div>
          <p class="who-text">${p.text}</p>
        </div>`).join('');
    }

    const featGrid = document.getElementById('features-grid');
    if (featGrid && c.features && c.features.items) {
      featGrid.innerHTML = c.features.items.map(f => `
        <div class="feature-card">
          <div class="feature-icon">${f.icon}</div>
          <h3 class="feature-title">${f.title}</h3>
          <p class="feature-text">${f.text}</p>
        </div>`).join('');
    }

    const revGrid = document.getElementById('reviews-grid');
    if (revGrid && c.reviews && c.reviews.testimonials) {
      revGrid.innerHTML = c.reviews.testimonials.map((t, i) => {
        const cls = i === 0 ? ' featured-review' : '';
        return `
          <div class="review-card${cls}">
            <div class="review-stars">★★★★★</div>
            <div class="review-quote">${t.text}</div>
            <div class="review-author">${t.author}</div>
            <p class="review-context">${t.context}</p>
          </div>`;
      }).join('');
    }

    const stepsGrid = document.getElementById('steps-grid');
    if (stepsGrid && c.how && c.how.steps) {
      stepsGrid.innerHTML = c.how.steps.map(st => `
        <div class="step-card">
          <span class="step-number">${st.number}</span>
          <h3 class="step-title">${st.title}</h3>
          <p class="step-text">${st.text}</p>
        </div>`).join('');
    }

    const faqList = document.getElementById('faq-list');
    if (faqList && c.faq && c.faq.items) {
      faqList.innerHTML = c.faq.items.map(item => `
        <div class="faq-item">
          <div class="faq-question">
            <span class="faq-q-text">${item.question}</span>
            <span class="faq-icon">+</span>
          </div>
          <div class="faq-answer">
            <div class="faq-answer-inner">${item.answer}</div>
          </div>
        </div>`).join('');
    }

    const verdictBadges = document.getElementById('verdict-badges');
    if (verdictBadges && c.verdict && c.verdict.badges) {
      verdictBadges.innerHTML = c.verdict.badges.map(b => `
        <span class="verdict-badge">${b}</span>`).join('');
    }
  })();
  </script>

</body>
</html>
