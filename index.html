<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="meta-title"></title>
  <meta id="meta-desc" name="description" content="">
  <meta id="meta-keywords" name="keywords" content="">
  <link rel="canonical" href="https://nomi-ai.net/">
  <!-- Open Graph -->
  <meta id="og-title" property="og:title" content="">
  <meta id="og-desc" property="og:description" content="">
  <meta property="og:url" content="https://nomi-ai.net/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://nomi-ai.net/images/og-cover.webp">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta id="tw-title" name="twitter:title" content="">
  <meta id="tw-desc" name="twitter:description" content="">
  <meta name="twitter:image" content="https://nomi-ai.net/images/og-cover.webp">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <style>
    /* ===========================
       CSS VARIABLES
    =========================== */
    :root {
      --bg:          #0f0f1a;
      --card-bg:     #1a1a2e;
      --text:        #f1f5f9;
      --text-muted:  #94a3b8;
      --primary:     #8b5cf6;
      --accent:      #ec4899;
      --border:      #2d2d44;
      --radius:      12px;
      --radius-sm:   8px;
      --transition:  0.2s ease;
      --shadow:      0 4px 24px rgba(0,0,0,.4);
    }

    /* ===========================
       RESET & BASE
    =========================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      line-height: 1.6;
    }

    img { display: block; max-width: 100%; }

    a { color: var(--primary); text-decoration: none; }
    a:hover { color: var(--accent); }

    h1 { font-size: 3rem; font-weight: 800; line-height: 1.1; }
    h2 { font-size: 2rem; font-weight: 800; line-height: 1.2; }
    h3 { font-size: 1.1rem; font-weight: 700; }

    p { margin-bottom: 1rem; color: var(--text-muted); }
    p:last-child { margin-bottom: 0; }

    section { padding: 4rem 0; border-top: 1px solid rgba(45,45,68,.3); }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .section-header {
      text-align: center;
      margin-bottom: 3rem;
      position: relative;
    }
    .section-header h2 { 
      margin-bottom: .75rem;
      position: relative;
      display: inline-block;
    }
    .section-header h2::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 3px;
    }
    .section-header p {
      color: var(--text-muted);
      font-size: 1.1rem;
      max-width: 600px;
      margin: 1.5rem auto 0;
    }
    .section-header p { max-width: 640px; margin: 0 auto; }

    /* ===========================
       GRADIENT TEXT
    =========================== */
    .gradient-text {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ===========================
       BUTTONS
    =========================== */
    .btn {
      display: inline-block;
      padding: .85rem 2rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition);
      text-decoration: none;
      border: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(139,92,246,.35);
      color: #fff;
    }
    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-2px);
    }
    .btn-sm {
      padding: .6rem 1.4rem;
      font-size: .9rem;
    }

    /* ===========================
       CARDS
    =========================== */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: border-color var(--transition), transform var(--transition);
    }
    .card:hover {
      border-color: var(--primary);
      transform: translateY(-3px);
    }

    /* ===========================
       HERO
    =========================== */
    #hero {
      position: relative;
      overflow: hidden;
      padding: 6rem 0 5rem;
      background:
        radial-gradient(ellipse at top right, rgba(139,92,246,.2), transparent 60%),
        radial-gradient(ellipse at bottom left, rgba(236,72,153,.15), transparent 60%);
    }
    .hero-badge {
      display: inline-block;
      background: rgba(139,92,246,.15);
      border: 1px solid rgba(139,92,246,.35);
      color: var(--primary);
      border-radius: 50px;
      padding: .4rem 1.1rem;
      font-size: .85rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .hero-title {
      margin-bottom: 1.5rem;
      white-space: pre-line;
    }
    .hero-subtitle {
      font-size: 1.15rem;
      max-width: 600px;
      margin-bottom: 2rem;
    }
    .hero-subtitle p { color: var(--text-muted); font-size: 1.15rem; }
    .hero-cta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* ===========================
       TABLE OF CONTENTS
    =========================== */
    #toc {
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .toc-inner {
      display: flex;
      gap: .5rem 2rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .toc-label {
      font-weight: 700;
      font-size: .9rem;
      color: var(--text);
      white-space: nowrap;
    }
    .toc-list {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem .75rem;
      list-style: none;
    }
    .toc-list li a {
      font-size: .85rem;
      color: var(--text-muted);
      padding: .3rem .6rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      transition: color var(--transition), border-color var(--transition);
    }
    .toc-list li a:hover {
      color: var(--primary);
      border-color: var(--primary);
    }

    /* ===========================
       REVIEW SUMMARY
    =========================== */
    #summary { background: #16162c; }
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: start;
    }
    .summary-text h2 { margin-bottom: 1.5rem; }
    .scorecard {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }
    .rating-headline {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--text);
    }
    .score-bar { margin-bottom: 1.25rem; }
    .score-bar-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: .4rem;
      font-size: .85rem;
    }
    .score-bar-label { color: var(--text-muted); }
    .score-bar-value { color: var(--primary); font-weight: 700; }
    .bar-track {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 4px;
      width: 0;
      transition: width 1s ease;
    }
    .scorecard .btn { width: 100%; text-align: center; margin-top: 1.5rem; }

    /* ===========================
       CHARACTER GALLERY
    =========================== */
    .characters-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }
    .character-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color var(--transition), transform var(--transition);
    }
    .character-card:hover {
      border-color: var(--primary);
      transform: translateY(-3px);
    }
    .character-card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
    }
    .character-card-body { padding: 1.25rem; }
    .character-name { font-weight: 800; font-size: 1.1rem; margin-bottom: .25rem; }
    .character-tagline {
      font-size: .8rem;
      font-weight: 600;
      color: var(--primary);
      background: rgba(139,92,246,.12);
      border: 1px solid rgba(139,92,246,.25);
      border-radius: 50px;
      padding: .2rem .7rem;
      display: inline-block;
      margin-bottom: .75rem;
    }
    .character-desc { font-size: .9rem; color: var(--text-muted); margin: 0; }
    .characters-cta { text-align: center; }

    /* ===========================
       COMPARISON TABLE
    =========================== */
    #comparison { background: #16162c; }
    .comparison-intro { margin-bottom: 2rem; color: var(--text-muted); }
    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .comparison-table th {
      padding: 1rem 1.25rem;
      text-align: left;
      font-size: .9rem;
      font-weight: 700;
    }
    .comparison-table th:nth-child(1) { background: #1e1e38; color: var(--text-muted); }
    .comparison-table th:nth-child(2) {
      background: linear-gradient(135deg, rgba(139,92,246,.25), rgba(236,72,153,.15));
      color: var(--text);
      text-align: center;
    }
    .comparison-table th:nth-child(3) { background: #1e1e38; color: var(--text-muted); text-align: center; }
    .comparison-table td {
      padding: .9rem 1.25rem;
      font-size: .9rem;
      border-top: 1px solid var(--border);
    }
    .comparison-table tr:nth-child(even) td { background: rgba(255,255,255,.02); }
    .comparison-table td:nth-child(1) { color: var(--text-muted); font-weight: 600; }
    .comparison-table td:nth-child(2) { color: var(--text); text-align: center; }
    .comparison-table td:nth-child(3) { color: var(--text-muted); text-align: center; font-size: .85rem; }
    .nomi-win { color: #4ade80; font-weight: 600; }
    .others-lose { color: #f87171; }
    .comparison-conclusion { color: var(--text-muted); margin-bottom: 1.5rem; }
    .comparison-cta { text-align: center; }

    /* ===========================
       PRICING
    =========================== */
    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      align-items: start;
    }
    .pricing-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      position: relative;
      transition: border-color var(--transition), transform var(--transition);
    }
    .pricing-card:hover { border-color: var(--primary); transform: translateY(-3px); }
    .pricing-card.featured {
      border-color: var(--primary);
      background: linear-gradient(180deg, rgba(139,92,246,.08) 0%, var(--card-bg) 100%);
    }
    .pricing-badge {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      font-size: .75rem;
      font-weight: 700;
      padding: .3rem .9rem;
      border-radius: 50px;
      white-space: nowrap;
    }
    .pricing-name { font-weight: 700; font-size: 1rem; color: var(--text-muted); margin-bottom: .5rem; }
    .pricing-price { font-size: 2.5rem; font-weight: 800; margin-bottom: .25rem; }
    .pricing-period { font-size: .85rem; color: var(--text-muted); margin-bottom: 1.5rem; }
    .pricing-features { list-style: none; margin-bottom: 1.5rem; }
    .pricing-features li {
      padding: .5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: .9rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .pricing-features li::before { content: "✓"; color: var(--primary); font-weight: 700; flex-shrink: 0; }
    .pricing-card .btn { width: 100%; text-align: center; }

    /* ===========================
       WHO IS IT FOR
    =========================== */
    #who { background: #16162c; }
    .who-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }
    .who-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: border-color var(--transition), transform var(--transition);
    }
    .who-card:hover { border-color: var(--primary); transform: translateY(-3px); }
    .who-icon { font-size: 2rem; margin-bottom: .75rem; }
    .who-title { font-weight: 700; margin-bottom: .5rem; }
    .who-text { font-size: .9rem; color: var(--text-muted); margin: 0; }

    /* ===========================
       KEY FEATURES
    =========================== */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }
    .feature-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      transition: border-color var(--transition), transform var(--transition);
    }
    .feature-card:hover { border-color: var(--primary); transform: translateY(-3px); }
    .feature-icon { font-size: 1.75rem; margin-bottom: .75rem; }
    .feature-title { margin-bottom: .75rem; }
    .feature-text { font-size: .9rem; color: var(--text-muted); margin: 0; }

    /* ===========================
       USER REVIEWS
    =========================== */
    #reviews { background: #16162c; }
    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }
    .review-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      transition: border-color var(--transition), transform var(--transition);
    }
    .review-card:hover { border-color: var(--primary); transform: translateY(-3px); }
    .review-card.featured-review { grid-column: span 2; }
    .review-stars { color: var(--accent); font-size: 1rem; margin-bottom: 1rem; }
    .review-quote {
      font-size: .95rem;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 1.25rem;
      font-style: italic;
    }
    .review-quote::before { content: """; color: var(--primary); font-size: 1.4rem; line-height: 0; vertical-align: -0.4rem; margin-right: .1rem; }
    .review-author { font-weight: 700; font-size: .9rem; }
    .review-context { font-size: .8rem; color: var(--text-muted); margin: 0; }

    /* ===========================
       HOW IT WORKS
    =========================== */
    .steps-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
      margin-bottom: 3rem;
    }
    .step-card {
      text-align: center;
      padding: 2.5rem 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      position: relative;
      transition: all var(--transition);
    }
    .step-card:hover {
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(139,92,246,.15);
    }
    .step-number {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .75rem;
      display: block;
    }
    .step-title { margin-bottom: .75rem; }
    .step-text { font-size: .9rem; color: var(--text-muted); margin: 0; }
    .how-cta { text-align: center; }

    /* ===========================
       FAQ
    =========================== */
    #faq { background: #16162c; }
    .faq-list { max-width: 760px; margin: 0 auto; }
    .faq-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1rem;
      overflow: hidden;
      transition: all var(--transition);
      background: var(--card-bg);
    }
    .faq-item:hover { 
      border-color: var(--primary);
      box-shadow: 0 4px 20px rgba(139,92,246,.1);
    }
    .faq-item.open {
      border-color: var(--primary);
      box-shadow: 0 4px 20px rgba(139,92,246,.1);
    }
    .faq-question {
      padding: 1.25rem 1.5rem;
      font-weight: 700;
      font-size: .95rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      background: var(--card-bg);
      color: var(--text);
      user-select: none;
    }
    .faq-question span { color: var(--primary); font-size: 1.25rem; flex-shrink: 0; transition: transform var(--transition); }
    .faq-item.open .faq-question span { transform: rotate(45deg); }
    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height .35s ease, opacity .35s ease;
      opacity: 0;
    }
    .faq-item.open .faq-answer { 
      max-height: 500px; 
      opacity: 1;
    }
    .faq-answer-inner {
      padding: 0 1.5rem;
      font-size: .9rem;
      color: var(--text-muted);
      line-height: 1.7;
      border-top: 1px solid transparent;
      transition: padding .35s ease, border-color .35s ease;
    }
    .faq-item.open .faq-answer-inner {
      padding: 1.25rem 1.5rem;
      border-top-color: var(--border);
    }

    /* ===========================
       FINAL VERDICT
    =========================== */
    #verdict {
      background:
        radial-gradient(ellipse at top left, rgba(139,92,246,.12), transparent 55%),
        radial-gradient(ellipse at bottom right, rgba(236,72,153,.1), transparent 55%);
    }
    .verdict-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3rem;
      max-width: 820px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .verdict-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
    }
    .verdict-box::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(139,92,246,.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .verdict-box h2 { margin-bottom: 2rem; }
    .verdict-box p { max-width: 680px; margin: 0 auto 1.25rem; }
    .verdict-badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: .75rem;
      margin: 2rem 0;
    }
    .verdict-badge {
      background: rgba(139,92,246,.12);
      border: 1px solid rgba(139,92,246,.3);
      color: var(--primary);
      border-radius: 50px;
      padding: .4rem 1rem;
      font-size: .85rem;
      font-weight: 700;
    }
    .verdict-box .btn { font-size: 1.1rem; padding: 1rem 2.5rem; margin: .5rem 0; }
    .affiliate-note {
      font-size: .8rem;
      color: var(--text-muted);
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    /* ===========================
       FOOTER
    =========================== */
    footer {
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      padding: 2.5rem 0;
      text-align: center;
    }
    .footer-copyright { font-size: .85rem; color: var(--text-muted); margin-bottom: .5rem; }
    .footer-disclaimer { font-size: .8rem; color: var(--border); }
    footer a { font-size: .85rem; }

    /* ===========================
       RESPONSIVE
    =========================== */
    @media (max-width: 1024px) {
      .characters-grid { grid-template-columns: repeat(2, 1fr); }
      .pricing-grid { grid-template-columns: repeat(2, 1fr); }
      .who-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      h1 { font-size: 2rem; }
      h2 { font-size: 1.6rem; }

      section { padding: 3rem 0; }

      .hero-cta { flex-direction: column; align-items: flex-start; }
      .hero-cta .btn { width: 100%; text-align: center; }

      .summary-grid { grid-template-columns: 1fr; gap: 2rem; }

      .characters-grid { grid-template-columns: 1fr; }
      .comparison-table { font-size: .8rem; }
      .comparison-table th, .comparison-table td { padding: .7rem .75rem; }

      .pricing-grid { grid-template-columns: 1fr; }
      .who-grid { grid-template-columns: 1fr; }
      .features-grid { grid-template-columns: 1fr; }
      .reviews-grid { grid-template-columns: 1fr; }
      .review-card.featured-review { grid-column: span 1; }
      .steps-grid { grid-template-columns: 1fr; }

      .verdict-box { padding: 2rem 1.5rem; }

      .toc-inner { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>

<body>
  <div id="js-indicator" style="position:fixed;top:0;right:0;background:#4ade80;color:#000;padding:.5rem 1rem;font-size:.8rem;z-index:9999;transition:opacity 1s">JS Running...</div>
  <script>
    setTimeout(() => {
      const el = document.getElementById('js-indicator');
      if (el) el.style.opacity = '0';
    }, 2000);
  </script>

  <!-- HERO -->
  <section id="hero">
    <div class="container" id="hero-container"></div>
  </section>

  <!-- TABLE OF CONTENTS -->
  <section id="toc">
    <div class="container">
      <div id="toc-container"></div>
    </div>
  </section>

  <!-- REVIEW SUMMARY -->
  <section id="summary">
    <div class="container">
      <div id="summary-container"></div>
    </div>
  </section>

  <!-- CHARACTER GALLERY -->
  <section id="characters">
    <div class="container">
      <div id="characters-container"></div>
    </div>
  </section>

  <!-- COMPARISON TABLE -->
  <section id="comparison">
    <div class="container">
      <div id="comparison-container"></div>
    </div>
  </section>

  <!-- PRICING -->
  <section id="pricing">
    <div class="container">
      <div id="pricing-container"></div>
    </div>
  </section>

  <!-- WHO IS IT FOR -->
  <section id="who">
    <div class="container">
      <div id="who-container"></div>
    </div>
  </section>

  <!-- KEY FEATURES -->
  <section id="features">
    <div class="container">
      <div id="features-container"></div>
    </div>
  </section>

  <!-- USER REVIEWS -->
  <section id="reviews">
    <div class="container">
      <div id="reviews-container"></div>
    </div>
  </section>

  <!-- HOW IT WORKS -->
  <section id="how">
    <div class="container">
      <div id="how-container"></div>
    </div>
  </section>

  <!-- FAQ -->
  <section id="faq">
    <div class="container">
      <div id="faq-container"></div>
    </div>
  </section>

  <!-- FINAL VERDICT -->
  <section id="verdict">
    <div class="container">
      <div id="verdict-container"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <div id="footer-container"></div>
    </div>
  </footer>

  <script>
  /* ============================================================
     NOMI-AI.NET — Content Injection Engine
     Fetches content.json → injects into DOM
  ============================================================ */

  (async function () {

    /* ── Fetch ─────────────────────────────────────────────── */
    let c;
    try {
      const res = await fetch('./content.json?v=2');
      if (!res.ok) throw new Error('Failed to load content.json');
      c = await res.json();
    } catch (e) {
      console.error(e);
      return;
    }

    /* ── Helpers ────────────────────────────────────────────── */
    const $ = id => document.getElementById(id);
    const el = (tag, cls, html) => {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (html !== undefined) e.innerHTML = html;
      return e;
    };
    const aff = '/go/nomi';

    /* ── Meta Tags ──────────────────────────────────────────── */
    document.title = c.meta.title;
    $('meta-title').textContent = c.meta.title;
    $('meta-desc').setAttribute('content', c.meta.description);
    $('meta-keywords').setAttribute('content', c.meta.keywords);
    $('og-title').setAttribute('content', c.meta.title);
    $('og-desc').setAttribute('content', c.meta.description);
    $('tw-title').setAttribute('content', c.meta.title);
    $('tw-desc').setAttribute('content', c.meta.description);

    /* ── HERO ───────────────────────────────────────────────── */
    const h = c.hero;
    $('hero-container').innerHTML = `
      <div class="hero-badge">${h.badge}</div>
      <h1 class="hero-title">${h.title.replace('\n', '<br>')}</h1>
      <div class="hero-subtitle"><p>${h.paragraph1}</p><p>${h.paragraph2}</p></div>
      <div class="hero-cta">
        <a href="${aff}" class="btn btn-primary" rel="sponsored noopener" target="_blank">${h.cta_primary}</a>
        <a href="#summary" class="btn btn-secondary">${h.cta_secondary}</a>
      </div>`;

    /* ── TABLE OF CONTENTS ──────────────────────────────────── */
    const toc = c.toc;
    const tocItems = toc.items.map(i =>
      `<li><a href="${i.href}">${i.text}</a></li>`
    ).join('');
    $('toc-container').innerHTML = `
      <div class="toc-inner">
        <span class="toc-label">${toc.title}</span>
        <ul class="toc-list">${tocItems}</ul>
      </div>`;

    /* ── REVIEW SUMMARY ─────────────────────────────────────── */
    const s = c.summary;
    const scoreBars = s.scores.map(sc => `
      <div class="score-bar">
        <div class="score-bar-header">
          <span class="score-bar-label">${sc.label}</span>
          <span class="score-bar-value">${sc.value}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" data-percent="${sc.percent}"></div></div>
      </div>`).join('');
    $('summary-container').innerHTML = `
      <div class="section-header">
        <h2>${s.title}</h2>
        <p>${s.subtitle}</p>
      </div>
      <div class="summary-grid">
        <div class="summary-text">
          <p>${s.paragraph1}</p>
          <p>${s.paragraph2}</p>
          <p>${s.paragraph3}</p>
        </div>
        <div class="scorecard">
          <div class="rating-headline">${s.rating_label}</div>
          ${scoreBars}
          <a href="${aff}" class="btn btn-primary" rel="sponsored noopener" target="_blank">${s.cta}</a>
        </div>
      </div>`;

    // Animate bars after render
    requestAnimationFrame(() => {
      setTimeout(() => {
        document.querySelectorAll('.bar-fill').forEach(bar => {
          bar.style.width = bar.dataset.percent + '%';
        });
      }, 300);
    });

    /* ── CHARACTER GALLERY ──────────────────────────────────── */
    const chars = c.characters;
    const charCards = chars.items.map(ch => `
      <div class="character-card">
        <img src="${ch.image}" alt="${ch.name} — Nomi AI Companion" loading="lazy" width="280" height="280">
        <div class="character-card-body">
          <div class="character-name">${ch.name}</div>
          <span class="character-tagline">${ch.tagline}</span>
          <p class="character-desc">${ch.description}</p>
        </div>
      </div>`).join('');
    $('characters-container').innerHTML = `
      <div class="section-header">
        <h2>${chars.title}</h2>
        <p>${chars.subtitle}</p>
      </div>
      <div class="characters-grid">${charCards}</div>
      <div class="characters-cta">
        <a href="${aff}" class="btn btn-primary" rel="sponsored noopener" target="_blank">${chars.cta}</a>
      </div>`;

    /* ── COMPARISON TABLE ───────────────────────────────────── */
    const comp = c.comparison;
    const compRows = comp.rows.map(r => `
      <tr>
        <td>${r.feature}</td>
        <td class="nomi-win">✓ ${r.nomi}</td>
        <td class="others-lose">✗ ${r.others}</td>
      </tr>`).join('');
    $('comparison-container').innerHTML = `
      <div class="section-header">
        <h2>${comp.title}</h2>
        <p>${comp.subtitle}</p>
      </div>
      <p class="comparison-intro">${comp.intro}</p>
      <table class="comparison-table">
        <thead>
          <tr>
            <th>${comp.table_headers[0]}</th>
            <th>${comp.table_headers[1]}</th>
            <th>${comp.table_headers[2]}</th>
          </tr>
        </thead>
        <tbody>${compRows}</tbody>
      </table>
      <p class="comparison-conclusion">${comp.conclusion}</p>
      <div class="comparison-cta">
        <a href="${aff}" class="btn btn-primary" rel="sponsored noopener" target="_blank">${comp.cta}</a>
      </div>`;

    /* ── PRICING ────────────────────────────────────────────── */
    const pricing = c.pricing;
    const planCards = pricing.plans.map(plan => {
      const feats = plan.features.map(f => `<li>${f}</li>`).join('');
      const badge = plan.featured ? `<div class="pricing-badge">⭐ MOST POPULAR</div>` : '';
      return `
        <div class="pricing-card${plan.featured ? ' featured' : ''}">
          ${badge}
          <div class="pricing-name">${plan.name}</div>
          <div class="pricing-price${plan.featured ? ' gradient-text' : ''}">${plan.price}</div>
          <div class="pricing-period">${plan.period}</div>
          <ul class="pricing-features">${feats}</ul>
          <a href="${aff}" class="btn ${plan.featured ? 'btn-primary' : 'btn-secondary'}" rel="sponsored noopener" target="_blank">${plan.cta}</a>
        </div>`;
    }).join('');
    $('pricing-container').innerHTML = `
      <div class="section-header">
        <h2>${pricing.title}</h2>
        <p>${pricing.subtitle}</p>
      </div>
      <div class="pricing-grid">${planCards}</div>`;

    /* ── WHO IS IT FOR ──────────────────────────────────────── */
    const who = c.who;
    const whoCards = who.profiles.map(p => `
      <div class="who-card">
        <div class="who-icon">${p.icon}</div>
        <div class="who-title">${p.title}</div>
        <p class="who-text">${p.text}</p>
      </div>`).join('');
    $('who-container').innerHTML = `
      <div class="section-header">
        <h2>${who.title}</h2>
        <p>${who.subtitle}</p>
      </div>
      <div class="who-grid">${whoCards}</div>`;

    /* ── KEY FEATURES ───────────────────────────────────────── */
    const feats = c.features;
    const featCards = feats.items.map(f => `
      <div class="feature-card">
        <div class="feature-icon">${f.icon}</div>
        <h3 class="feature-title">${f.title}</h3>
        <p class="feature-text">${f.text}</p>
      </div>`).join('');
    $('features-container').innerHTML = `
      <div class="section-header">
        <h2>${feats.title}</h2>
        <p>${feats.subtitle}</p>
      </div>
      <div class="features-grid">${featCards}</div>`;

    /* ── USER REVIEWS ───────────────────────────────────────── */
    const rev = c.reviews;
    const reviewCards = rev.testimonials.map((t, i) => `
      <div class="review-card${i === 0 ? ' featured-review' : ''}">
        <div class="review-stars">★★★★★</div>
        <div class="review-quote">${t.text}</div>
        <div class="review-author">${t.author}</div>
        <p class="review-context">${t.context}</p>
      </div>`).join('');
    $('reviews-container').innerHTML = `
      <div class="section-header">
        <h2>${rev.title}</h2>
        <p>${rev.subtitle}</p>
      </div>
      <div class="reviews-grid">${reviewCards}</div>`;

    /* ── HOW IT WORKS ───────────────────────────────────────── */
    const how = c.how;
    const stepCards = how.steps.map(st => `
      <div class="step-card">
        <span class="step-number">${st.number}</span>
        <h3 class="step-title">${st.title}</h3>
        <p class="step-text">${st.text}</p>
      </div>`).join('');
    $('how-container').innerHTML = `
      <div class="section-header">
        <h2>${how.title}</h2>
        <p>${how.subtitle}</p>
      </div>
      <div class="steps-grid">${stepCards}</div>
      <div class="how-cta">
        <a href="${aff}" class="btn btn-primary" rel="sponsored noopener" target="_blank">${how.cta}</a>
      </div>`;

    /* ── FAQ ────────────────────────────────────────────────── */
    const faq = c.faq;
    const faqItems = faq.items.map((item, i) => `
      <div class="faq-item" id="faq-item-${i}">
        <div class="faq-question" data-index="${i}">
          ${item.question}
          <span>+</span>
        </div>
        <div class="faq-answer">
          <div class="faq-answer-inner">${item.answer}</div>
        </div>
      </div>`).join('');
    $('faq-container').innerHTML = `
      <div class="section-header">
        <h2>${faq.title}</h2>
      </div>
      <div class="faq-list">${faqItems}</div>`;

    // FAQ accordion behaviour
    console.log('FAQ items found:', document.querySelectorAll('.faq-question').length);
    document.querySelectorAll('.faq-question').forEach((q, i) => {
      q.addEventListener('click', (e) => {
        e.stopPropagation();
        console.log('FAQ clicked:', i);
        const item = q.closest('.faq-item');
        const isOpen = item.classList.contains('open');
        // Ferme tous les items ouverts
        document.querySelectorAll('.faq-item.open').forEach(o => o.classList.remove('open'));
        // Ouvre l'item cliqué s'il était fermé
        if (!isOpen) item.classList.add('open');
      });
    });

    /* ── FINAL VERDICT ──────────────────────────────────────── */
    const verd = c.verdict;
    const badges = verd.badges.map(b => `<span class="verdict-badge">${b}</span>`).join('');
    $('verdict-container').innerHTML = `
      <div class="verdict-box">
        <h2>${verd.title}</h2>
        <p>${verd.paragraph1}</p>
        <p>${verd.paragraph2}</p>
        <p>${verd.paragraph3}</p>
        <div class="verdict-badges">${badges}</div>
        <a href="${aff}" class="btn btn-primary" rel="sponsored noopener" target="_blank">${verd.cta}</a>
        <p class="affiliate-note">${verd.affiliate_note}</p>
      </div>`;

    /* ── FOOTER ─────────────────────────────────────────────── */
    const foot = c.footer;
    $('footer-container').innerHTML = `
      <p class="footer-copyright">${foot.copyright} — <a href="${aff}" rel="sponsored noopener" target="_blank">${foot.link}</a></p>
      <p class="footer-disclaimer">${foot.disclaimer}</p>`;

    /* ── SCHEMA.ORG ─────────────────────────────────────────── */
    const schema = [
      {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "Nomi.ai",
        "url": "https://nomi.ai",
        "description": c.meta.description,
        "brand": { "@type": "Brand", "name": "Nomi.ai" },
        "offers": {
          "@type": "AggregateOffer",
          "lowPrice": "0",
          "highPrice": "19.99",
          "priceCurrency": "USD",
          "offerCount": "3"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "9.2",
          "bestRating": "10",
          "worstRating": "1",
          "reviewCount": "1000"
        }
      },
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": c.faq.items.map(item => ({
          "@type": "Question",
          "name": item.question,
          "acceptedAnswer": { "@type": "Answer", "text": item.answer }
        }))
      },
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [{
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://nomi-ai.net/"
        }]
      }
    ];

    schema.forEach(s => {
      const tag = document.createElement('script');
      tag.type = 'application/ld+json';
      tag.textContent = JSON.stringify(s);
      document.head.appendChild(tag);
    });

  })();
  </script>

</body>
</html>
