<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="meta.title"></title>
  <meta name="description" data-i18n-attr="content|meta.description" content="">
  <meta name="keywords" data-i18n-attr="content|meta.keywords" content="">
  <link rel="canonical" href="https://nomi-ai.net/">
  <meta property="og:title" data-i18n-attr="content|meta.title" content="">
  <meta property="og:description" data-i18n-attr="content|meta.description" content="">
  <meta property="og:url" content="https://nomi-ai.net/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" data-i18n-attr="content|meta.title" content="">
  <meta name="twitter:description" data-i18n-attr="content|meta.description" content="">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root{--primary:#8b5cf6;--primary-dark:#7c3aed;--accent:#ec4899;--bg:#0f0f1a;--bg-card:#1a1a2e;--text:#f1f5f9;--text-muted:#94a3b8;--border:#2d2d44}
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    a{color:var(--primary);text-decoration:none}
    img{max-width:100%;height:auto;border-radius:.75rem}
    .container{max-width:1100px;margin:0 auto;padding:0 1.5rem}
    .btn{display:inline-block;padding:.9rem 2rem;border-radius:9999px;font-weight:700;transition:all .2s;cursor:pointer;border:none;font-size:1rem}
    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(139,92,246,.3)}
    .btn-secondary{background:rgba(255,255,255,.1);color:#fff;border:1px solid var(--border)}
    .btn-secondary:hover{background:rgba(255,255,255,.15)}
    .badge{display:inline-block;padding:.4rem 1rem;border-radius:9999px;font-size:.85rem;font-weight:600;background:rgba(139,92,246,.15);color:var(--primary);border:1px solid rgba(139,92,246,.3)}
    .section{padding:4rem 0}
    .section-title{font-size:2rem;font-weight:800;margin-bottom:1rem;text-align:center}
    .section-subtitle{color:var(--text-muted);text-align:center;margin-bottom:3rem;font-size:1.1rem}
    .grid{display:grid;gap:1.5rem}
    .grid-2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
    .grid-3{grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}
    .grid-4{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:1rem;padding:1.5rem;transition:all .2s}
    .card:hover{border-color:var(--primary);transform:translateY(-3px)}
    .card-icon{font-size:2rem;margin-bottom:1rem}
    .card h3{font-size:1.1rem;margin-bottom:.5rem;color:#fff}
    .card p{color:var(--text-muted);font-size:.95rem}
    .progress-bar{background:rgba(255,255,255,.1);border-radius:9999px;height:.5rem;overflow:hidden;margin:.5rem 0}
    .progress-fill{background:linear-gradient(90deg,var(--primary),var(--accent));height:100%;border-radius:9999px}
    .testimonial{background:var(--bg-card);border:1px solid var(--border);border-radius:1rem;padding:1.5rem;margin-bottom:1rem}
    .testimonial-text{font-style:italic;color:var(--text-muted);margin-bottom:1rem}
    .testimonial-author{font-weight:700;color:#fff}
    .testimonial-context{font-size:.85rem;color:var(--text-muted)}
    .toc{background:var(--bg-card);border:1px solid var(--border);border-radius:1rem;padding:1.5rem;margin:2rem 0}
    .toc ul{list-style:none}
    .toc li{margin:.5rem 0}
    .toc a{color:var(--text-muted);transition:color .2s}
    .toc a:hover{color:var(--primary)}
    .faq-item{background:var(--bg-card);border:1px solid var(--border);border-radius:.75rem;margin-bottom:1rem;overflow:hidden}
    .faq-question{padding:1rem 1.5rem;cursor:pointer;font-weight:600;display:flex;justify-content:space-between;align-items:center}
    .faq-answer{padding:0 1.5rem;max-height:0;overflow:hidden;transition:all .3s;color:var(--text-muted)}
    .faq-item.active .faq-answer{padding:0 1.5rem 1rem;max-height:500px}
    .hero{min-height:90vh;display:flex;align-items:center;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top right,rgba(139,92,246,.2),transparent 60%),radial-gradient(ellipse at bottom left,rgba(236,72,153,.15),transparent 60%);pointer-events:none}
    .hero-content{position:relative;z-index:1}
    .hero h1{font-size:3rem;font-weight:800;line-height:1.1;margin-bottom:1.5rem;background:linear-gradient(135deg,#fff,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .hero p{font-size:1.15rem;color:var(--text-muted);margin-bottom:1.5rem;max-width:600px}
    .hero-buttons{display:flex;gap:1rem;flex-wrap:wrap;margin-top:2rem}
    .score-item{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem;background:rgba(255,255,255,.05);border-radius:.5rem}
    .score-label{font-size:.9rem;color:var(--text-muted)}
    .score-value{font-weight:700;color:var(--primary)}
    .price-card{text-align:center;padding:2rem}
    .price-card.featured{border-color:var(--primary);position:relative}
    .price-card.featured::before{content:'POPULAR';position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;padding:.25rem 1rem;border-radius:9999px;font-size:.75rem;font-weight:700}
    .price-amount{font-size:2.5rem;font-weight:800;margin:.5rem 0}
    .price-period{color:var(--text-muted);font-size:.9rem}
    .price-features{list-style:none;margin:1.5rem 0;text-align:left}
    .price-features li{padding:.4rem 0;color:var(--text-muted);display:flex;align-items:center;gap:.5rem}
    .price-features li::before{content:'✓';color:var(--primary);font-weight:700}
    .final-cta{background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(236,72,153,.1));border:1px solid var(--border);border-radius:1.5rem;padding:3rem;text-align:center;margin-top:3rem}
    .affiliate-note{text-align:center;color:var(--text-muted);font-size:.85rem;margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border)}
    footer{text-align:center;padding:2rem;color:var(--text-muted);font-size:.9rem}
    /* Character cards */
    .char-card{text-align:center;padding:1.5rem}
    .char-card img{width:100%;height:280px;object-fit:cover;border-radius:1rem;margin-bottom:1rem}
    .char-card .char-name{font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:.25rem}
    .char-card .char-tagline{font-size:.9rem;color:var(--primary);margin-bottom:.5rem}
    .char-card .char-desc{font-size:.9rem;color:var(--text-muted)}
    /* Comparison table */
    .comp-table{width:100%;border-collapse:collapse;margin:1.5rem 0}
    .comp-table th{padding:1rem;text-align:left;background:rgba(139,92,246,.15);color:#fff;font-weight:700;border:1px solid var(--border)}
    .comp-table td{padding:1rem;border:1px solid var(--border);color:var(--text-muted)}
    .comp-table tr:nth-child(even){background:rgba(255,255,255,.02)}
    .comp-table .nomi-col{color:var(--primary);font-weight:600}
    .comp-intro{text-align:center;max-width:700px;margin:0 auto 2rem;color:var(--text-muted)}
    .comp-conclusion{text-align:center;max-width:700px;margin:2rem auto 0;color:var(--text-muted)}
    @media(max-width:768px){.hero h1{font-size:2rem}.section-title{font-size:1.5rem}.hero-buttons{flex-direction:column}.comp-table{font-size:.85rem}.comp-table th,.comp-table td{padding:.5rem}}
  </style>
</head>
<body>

<section class="hero">
  <div class="container hero-content">
    <span class="badge" data-i18n="hero.badge"></span>
    <h1 data-i18n="hero.title"></h1>
    <p data-i18n="hero.paragraph1"></p>
    <p data-i18n="hero.paragraph2"></p>
    <div class="hero-buttons">
      <a href="/go/nomi" class="btn btn-primary" data-i18n="hero.cta_primary"></a>
      <a href="#features" class="btn btn-secondary" data-i18n="hero.cta_secondary"></a>
    </div>
  </div>
</section>

<div class="container">
  <div class="toc">
    <p style="font-weight:700;margin-bottom:1rem;color:#fff" data-i18n="toc.title"></p>
    <ul id="toc-list"></ul>
  </div>
</div>

<section class="section" id="summary">
  <div class="container">
    <h2 class="section-title" data-i18n="summary.title"></h2>
    <p class="section-subtitle" data-i18n="summary.subtitle"></p>
    <div class="grid grid-2">
      <div class="card">
        <p data-i18n="summary.paragraph1"></p>
        <p style="margin-top:1rem;color:var(--text-muted)" data-i18n="summary.paragraph2"></p>
        <p style="margin-top:1rem;color:var(--text-muted)" data-i18n="summary.paragraph3"></p>
      </div>
      <div class="card">
        <p style="font-weight:700;margin-bottom:1rem;color:#fff" data-i18n="summary.rating_label"></p>
        <div id="scores-container"></div>
        <a href="/go/nomi" class="btn btn-primary" style="width:100%;margin-top:1.5rem;text-align:center" data-i18n="summary.cta"></a>
      </div>
    </div>
  </div>
</section>

<!-- CHARACTERS SECTION -->
<section class="section" id="characters" style="background:rgba(255,255,255,.02)">
  <div class="container">
    <h2 class="section-title" data-i18n="characters.title"></h2>
    <p class="section-subtitle" data-i18n="characters.subtitle"></p>
    <div class="grid grid-3" id="characters-container"></div>
    <div style="text-align:center;margin-top:2rem">
      <a href="/go/nomi" class="btn btn-primary" data-i18n="characters.cta"></a>
    </div>
  </div>
</section>

<!-- COMPARISON SECTION -->
<section class="section" id="comparison">
  <div class="container">
    <h2 class="section-title" data-i18n="comparison.title"></h2>
    <p class="section-subtitle" data-i18n="comparison.subtitle"></p>
    <p class="comp-intro" data-i18n="comparison.intro"></p>
    <div style="overflow-x:auto">
      <table class="comp-table" id="comparison-table"></table>
    </div>
    <p class="comp-conclusion" data-i18n="comparison.conclusion"></p>
    <div style="text-align:center;margin-top:2rem">
      <a href="/go/nomi" class="btn btn-primary" data-i18n="comparison.cta"></a>
    </div>
  </div>
</section>

<section class="section" id="pricing" style="background:rgba(255,255,255,.02)">
  <div class="container">
    <h2 class="section-title" data-i18n="pricing.title"></h2>
    <p class="section-subtitle" data-i18n="pricing.subtitle"></p>
    <div class="grid grid-3" id="pricing-container"></div>
  </div>
</section>

<section class="section" id="who">
  <div class="container">
    <h2 class="section-title" data-i18n="who.title"></h2>
    <p class="section-subtitle" data-i18n="who.subtitle"></p>
    <div class="grid grid-3" id="who-container"></div>
  </div>
</section>

<section class="section" id="features" style="background:rgba(255,255,255,.02)">
  <div class="container">
    <h2 class="section-title" data-i18n="features.title"></h2>
    <p class="section-subtitle" data-i18n="features.subtitle"></p>
    <div class="grid grid-2" id="features-container"></div>
  </div>
</section>

<section class="section" id="reviews">
  <div class="container">
    <h2 class="section-title" data-i18n="reviews.title"></h2>
    <p class="section-subtitle" data-i18n="reviews.subtitle"></p>
    <div id="reviews-container"></div>
  </div>
</section>

<section class="section" id="how" style="background:rgba(255,255,255,.02)">
  <div class="container">
    <h2 class="section-title" data-i18n="how.title"></h2>
    <p class="section-subtitle" data-i18n="how.subtitle"></p>
    <div class="grid grid-3" id="how-container"></div>
    <div style="text-align:center;margin-top:3rem">
      <a href="/go/nomi" class="btn btn-primary" data-i18n="how.cta"></a>
    </div>
  </div>
</section>

<section class="section" id="faq">
  <div class="container">
    <h2 class="section-title" data-i18n="faq.title"></h2>
    <div id="faq-container"></div>
  </div>
</section>

<section class="section" id="verdict" style="background:rgba(255,255,255,.02)">
  <div class="container">
    <h2 class="section-title" data-i18n="verdict.title"></h2>
    <div class="final-cta">
      <p style="font-size:1.2rem;margin-bottom:1.5rem" data-i18n="verdict.paragraph1"></p>
      <p style="color:var(--text-muted);margin-bottom:1.5rem" data-i18n="verdict.paragraph2"></p>
      <p style="color:var(--text-muted);margin-bottom:2rem" data-i18n="verdict.paragraph3"></p>
      <div style="display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;margin-bottom:2rem" id="verdict-badges"></div>
      <a href="/go/nomi" class="btn btn-primary" style="font-size:1.2rem;padding:1rem 3rem" data-i18n="verdict.cta"></a>
    </div>
    <p class="affiliate-note" data-i18n="verdict.affiliate_note"></p>
  </div>
</section>

<footer>
  <div class="container">
    <p data-i18n="footer.copyright"></p>
    <p style="margin-top:.5rem"><a href="/go/nomi" data-i18n="footer.link"></a> | <span data-i18n="footer.disclaimer"></span></p>
  </div>
</footer>

<script>
fetch('content.json')
  .then(r => r.json())
  .then(data => {
    // Simple text injection
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      const value = key.split('.').reduce((o,k) => o?.[k], data);
      if (value) el.textContent = value;
    });
    document.querySelectorAll('[data-i18n-attr]').forEach(el => {
      const [attr, key] = el.getAttribute('data-i18n-attr').split('|');
      const value = key.split('.').reduce((o,k) => o?.[k], data);
      if (value) el.setAttribute(attr, value);
    });

    // TOC
    const tocList = document.getElementById('toc-list');
    data.toc.items.forEach(item => {
      const li = document.createElement('li');
      li.innerHTML = `<a href="${item.href}">${item.text}</a>`;
      tocList.appendChild(li);
    });

    // Scores
    const scoresContainer = document.getElementById('scores-container');
    data.summary.scores.forEach(score => {
      scoresContainer.innerHTML += `
        <div class="score-item">
          <span class="score-label">${score.label}</span>
          <span class="score-value">${score.value}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${score.percent}%"></div></div>
      `;
    });

    // Characters
    const charContainer = document.getElementById('characters-container');
    data.characters.items.forEach(char => {
      charContainer.innerHTML += `
        <div class="card char-card">
          <img src="${char.image}" alt="${char.name}" loading="lazy">
          <div class="char-name">${char.name}</div>
          <div class="char-tagline">${char.tagline}</div>
          <div class="char-desc">${char.description}</div>
        </div>
      `;
    });

    // Comparison table
    const compTable = document.getElementById('comparison-table');
    compTable.innerHTML = `
      <thead>
        <tr>
          <th>Feature</th>
          <th style="color:var(--primary)">Nomi.ai</th>
          <th>Other Apps</th>
        </tr>
      </thead>
      <tbody>
        ${data.comparison.rows.map(row => `
          <tr>
            <td><strong>${row.feature}</strong></td>
            <td class="nomi-col">${row.nomi}</td>
            <td>${row.others}</td>
          </tr>
        `).join('')}
      </tbody>
    `;

    // Pricing
    const pricingContainer = document.getElementById('pricing-container');
    data.pricing.plans.forEach(plan => {
      const featuredClass = plan.featured ? 'featured' : '';
      const btnClass = plan.featured ? 'btn-primary' : 'btn-secondary';
      const featuresHtml = plan.features.map(f => `<li>${f}</li>`).join('');
      pricingContainer.innerHTML += `
        <div class="card price-card ${featuredClass}">
          <h3>${plan.name}</h3>
          <div class="price-amount">${plan.price}</div>
          <div class="price-period">${plan.period}</div>
          <ul class="price-features">${featuresHtml}</ul>
          <a href="/go/nomi" class="btn ${btnClass}" style="width:100%;text-align:center">${plan.cta}</a>
        </div>
      `;
    });

    // Who
    const whoContainer = document.getElementById('who-container');
    data.who.profiles.forEach(p => {
      whoContainer.innerHTML += `
        <div class="card">
          <div class="card-icon">${p.icon}</div>
          <h3>${p.title}</h3>
          <p>${p.text}</p>
        </div>
      `;
    });

    // Features
    const featuresContainer = document.getElementById('features-container');
    data.features.items.forEach(f => {
      featuresContainer.innerHTML += `
        <div class="card">
          <div class="card-icon">${f.icon}</div>
          <h3>${f.title}</h3>
          <p>${f.text}</p>
        </div>
      `;
    });

    // Reviews
    const reviewsContainer = document.getElementById('reviews-container');
    data.reviews.testimonials.forEach(t => {
      reviewsContainer.innerHTML += `
        <div class="testimonial">
          <p class="testimonial-text">"${t.text}"</p>
          <p class="testimonial-author">${t.author}</p>
          <p class="testimonial-context">${t.context}</p>
        </div>
      `;
    });

    // How
    const howContainer = document.getElementById('how-container');
    data.how.steps.forEach(s => {
      howContainer.innerHTML += `
        <div class="card" style="text-align:center">
          <div style="font-size:3rem;font-weight:800;color:var(--primary);margin-bottom:1rem">${s.number}</div>
          <h3>${s.title}</h3>
          <p>${s.text}</p>
        </div>
      `;
    });

    // FAQ
    const faqContainer = document.getElementById('faq-container');
    data.faq.items.forEach(item => {
      faqContainer.innerHTML += `
        <div class="faq-item">
          <div class="faq-question" onclick="this.parentElement.classList.toggle('active')">
            ${item.question}
            <span>+</span>
          </div>
          <div class="faq-answer">${item.answer}</div>
        </div>
      `;
    });

    // Verdict badges
    const verdictBadges = document.getElementById('verdict-badges');
    data.verdict.badges.forEach(b => {
      verdictBadges.innerHTML += `<span class="badge">${b}</span>`;
    });

    // Schema
    const schemaProduct = {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "Nomi.ai",
      "description": data.meta.description,
      "image": "https://nomi-ai.net/favicon.svg",
      "offers": {
        "@type": "AggregateOffer",
        "priceCurrency": "USD",
        "lowPrice": "0",
        "highPrice": "19.99",
        "offerCount": "3"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "9.2",
        "reviewCount": "1000"
      }
    };
    const schemaFAQ = {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": data.faq.items.map(item => ({
        "@type": "Question",
        "name": item.question,
        "acceptedAnswer": {
          "@type": "Answer",
          "text": item.answer
        }
      }))
    };
    document.head.innerHTML += `<script type="application/ld+json">${JSON.stringify(schemaProduct)}<\/script>`;
    document.head.innerHTML += `<script type="application/ld+json">${JSON.stringify(schemaFAQ)}<\/script>`;
  });
</script>

</body>
</html>
