<!DOCTYPE html>
<html>
<head>
  <title>Nomi.ai - Diagnostic</title>
  <style>
    body { font-family: monospace; padding: 2rem; background: #0f0f1a; color: #f1f5f9; }
    .ok { color: #4ade80; }
    .error { color: #f87171; }
    .warn { color: #fbbf24; }
  </style>
</head>
<body>
  <h1>Diagnostic Page</h1>
  <div id="output"></div>
  <script>
    const out = document.getElementById('output');
    const log = (msg, type='info') => {
      const div = document.createElement('div');
      div.className = type;
      div.textContent = msg;
      out.appendChild(div);
    };
    
    log('JavaScript: ENABLED', 'ok');
    log('User Agent: ' + navigator.userAgent, 'info');
    
    fetch('./content.json')
      .then(r => {
        log('Fetch status: ' + r.status, r.ok ? 'ok' : 'error');
        return r.json();
      })
      .then(data => {
        log('JSON parsed: OK', 'ok');
        log('Keys found: ' + Object.keys(data).join(', '), 'ok');
        if (data.meta) {
          log('Title: ' + data.meta.title, 'ok');
        }
      })
      .catch(e => {
        log('Error: ' + e.message, 'error');
      });
  </script>
</body>
</html>
